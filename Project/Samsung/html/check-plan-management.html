<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="gnb-title" content="점검계획 관리" />
  <title>점검계획 관리 | Samsung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .min-h-0 { min-height: 0 !important; }
  </style>
</head>
<body class="bg-custom-base custom-scrollbar">
  <div id="app" class="vh-100 d-flex flex-column">
    <div class="d-flex flex-grow-1 min-h-0 bg-custom-base" style="min-width: 1440px;">
      <div id="lnb-placeholder" class="flex-shrink-0" style="width: 260px;"></div>

      <div class="main-content-wrap d-flex flex-column flex-grow-1 min-h-0 position-relative">
        <div id="gnb-placeholder"></div>

        <main class="flex-grow-1 d-flex flex-column min-h-0 overflow-y-auto main-content check-plan-main custom-scrollbar">
          <div class="d-flex flex-column main-inner check-plan-inner">
            <!-- 알림 배너 (점검계획 안내) -->
            <section class="asset-alert flex-shrink-0 check-plan-alert">
              <div class="asset-alert-inner">
                <span class="material-symbols-outlined asset-alert-icon">info</span>
                <p class="asset-alert-text">오직 Online으로 연결되어 있는 서버들만이 계획에 포함됩니다.</p>
                <button type="button" class="asset-alert-close btn btn-link p-0" aria-label="닫기">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </section>

            <!-- 상태별 현황 포틀릿 그룹 (컴포넌트) -->
            <section class="asset-portlet-section flex-shrink-0" id="portlet-group-check-status-placeholder"></section>

            <!-- 필터 바 (동적 태그 포함, 컴포넌트) -->
            <section class="asset-filter-bar flex-shrink-0 position-relative" id="filter-bar-placeholder"></section>

            <!-- 데이터 테이블 + 페이지네이션 (컴포넌트) -->
            <section class="asset-table-section flex-grow-1 min-h-0 d-flex flex-column" id="table-section-placeholder"></section>
          </div>
        </main>
      </div>
    </div>

    <!-- 점검계획 상세정보 슬라이드 팝업 (컴포넌트) -->
    <div id="modal-placeholder"></div>

    <script src="components/load.js"></script>
  </div>
</body>
</html>
