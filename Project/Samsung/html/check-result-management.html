<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="gnb-title" content="점검 결과 관리" />
  <title>점검 결과 관리 | Samsung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .min-h-0 { min-height: 0 !important; }
  </style>
</head>
<body class="bg-custom-base custom-scrollbar">
  <div id="app" class="vh-100 d-flex flex-column">
    <div class="d-flex flex-grow-1 min-h-0 bg-custom-base" style="min-width: 1440px;">
      <div id="lnb-placeholder" class="flex-shrink-0" style="width: 260px;"></div>

      <div class="main-content-wrap d-flex flex-column flex-grow-1 min-h-0 position-relative">
        <div id="gnb-placeholder"></div>

        <main class="flex-grow-1 d-flex flex-column min-h-0 overflow-y-auto main-content cr-main custom-scrollbar">
          <div class="d-flex flex-column main-inner cr-inner">
            <!-- 1. 상단 알림 배너 (cr-alert: 녹색 테마 override) -->
            <section class="asset-alert flex-shrink-0 cr-alert">
              <div class="asset-alert-inner">
                <span class="material-symbols-outlined asset-alert-icon">check_circle</span>
                <p class="asset-alert-text">개별 대상 점검은 10분, 권역/사업장 대상 점검은 1시간 이후 결과 확인 가능합니다.</p>
                <button type="button" class="asset-alert-close btn btn-link p-0" aria-label="닫기">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </section>

            <!-- 2. 요약 포틀릿 -->
            <section class="flex-shrink-0" id="cr-portlet-placeholder"></section>

            <!-- 3. 필터 바 -->
            <section class="asset-filter-bar flex-shrink-0 position-relative" id="cr-filter-bar-placeholder"></section>

            <!-- 4. 데이터 테이블 -->
            <section class="asset-table-section flex-grow-1 min-h-0 d-flex flex-column" id="cr-table-section-placeholder"></section>
          </div>
        </main>
      </div>
    </div>

    <!-- 점검결과 상세정보 슬라이드 팝업 (컴포넌트 로드) -->
    <!-- 점검결과 상세 슬라이드 팝업 플레이스홀더 (전체 컴포넌트를 load.js가 주입) -->
    <div id="cr-detail-placeholder" class="slide-popup-placeholder"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="components/load.js"></script>
</body>
</html>
