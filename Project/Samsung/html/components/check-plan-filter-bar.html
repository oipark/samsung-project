<ul class="asset-filter-bar-inner list-unstyled mb-0 ps-0 d-flex align-items-center">
  <li class="asset-filter-bar-item asset-filter-trigger-wrap">
    <button type="button" class="asset-filter-trigger-btn d-flex align-items-center gap-2 fw-bold" id="check-plan-filter-trigger" aria-expanded="false" aria-haspopup="true">
      <span class="material-symbols-outlined asset-filter-icon" style="font-variation-settings: 'FILL' 1;">filter_alt</span>
      <span class="asset-filter-label">Filter</span>
      <span class="asset-filter-badge" id="check-plan-filter-badge">4</span>
    </button>
  </li>
  <li class="asset-filter-bar-item asset-filter-right-wrap d-flex align-items-center flex-grow-1 min-w-0">
    <div class="asset-filter-tags-container asset-filter-chips-wrap" id="check-plan-filter-tags-container">
      <span class="filter-chip" data-filter-key="planName">점검명 : <strong class="text-custom-primary">전체</strong><span class="material-symbols-outlined filter-chip-close" aria-label="제거">close</span></span>
      <span class="filter-chip" data-filter-key="status">진행 상태 : <strong class="text-custom-primary">전체</strong><span class="material-symbols-outlined filter-chip-close" aria-label="제거">close</span></span>
      <span class="filter-chip" data-filter-key="type">점검 유형 : <strong class="text-custom-primary">전체</strong><span class="material-symbols-outlined filter-chip-close" aria-label="제거">close</span></span>
      <span class="filter-chip" data-filter-key="site">사업장/권역 : <strong class="text-custom-primary">전체</strong><span class="material-symbols-outlined filter-chip-close" aria-label="제거">close</span></span>
    </div>
    <button type="button" class="asset-filter-reset-btn" id="check-plan-filter-reset-btn" aria-label="전체 필터 초기화">
      <span class="material-symbols-outlined">refresh</span>
      필터 초기화
    </button>
  </li>
</ul>
<!-- 점검계획 상세 필터 패널 (Figma 393-3050: 점검명, 진행 상태, 점검 유형, 사업장/권역) -->
<div class="asset-filter-panel check-plan-filter-panel d-none" id="check-plan-filter-panel" role="dialog" aria-label="점검계획 필터">
  <div class="asset-filter-panel-inner">
    <div class="asset-filter-panel-body check-plan-filter-panel-body">
      <div class="asset-filter-panel-col">
        <div class="asset-filter-field">
          <label class="asset-filter-field-label" for="check-plan-filter-planName">점검명</label>
          <input type="text" class="form-control form-control-sm asset-filter-input" id="check-plan-filter-planName" name="checkPlanFilterPlanName" placeholder="점검명 입력" />
        </div>
        <div class="asset-filter-field">
          <label class="asset-filter-field-label" for="check-plan-filter-status">진행 상태</label>
          <select class="form-select form-select-sm asset-filter-input" id="check-plan-filter-status" name="checkPlanFilterStatus">
            <option value="">전체</option>
            <option value="계획 수립">계획 수립</option>
            <option value="진행중">진행중</option>
            <option value="점검 완료">점검 완료</option>
          </select>
        </div>
        <div class="asset-filter-field">
          <label class="asset-filter-field-label" for="check-plan-filter-type">점검 유형</label>
          <select class="form-select form-select-sm asset-filter-input" id="check-plan-filter-type" name="checkPlanFilterType">
            <option value="">전체</option>
            <option value="권역/사업장별">권역/사업장별</option>
            <option value="개별">개별</option>
          </select>
        </div>
        <div class="asset-filter-field">
          <label class="asset-filter-field-label" for="check-plan-filter-site">사업장/권역</label>
          <select class="form-select form-select-sm asset-filter-input" id="check-plan-filter-site" name="checkPlanFilterSite">
            <option value="">전체</option>
            <option value="수원사업장">수원사업장</option>
            <option value="구미사업장">구미사업장</option>
            <option value="중남미">중남미</option>
            <option value="중동">중동</option>
            <option value="동남아">동남아</option>
          </select>
        </div>
      </div>
    </div>
    <div class="asset-filter-panel-footer">
      <button type="button" class="btn-ds btn-ds-2nd" id="check-plan-filter-panel-reset">필터 초기화</button>
      <div class="asset-filter-panel-footer-right">
        <button type="button" class="btn-ds btn-ds-2nd" id="check-plan-filter-panel-cancel">취소</button>
        <button type="button" class="btn-ds btn-ds-1st" id="check-plan-filter-panel-apply">필터 적용</button>
      </div>
    </div>
  </div>
</div>
