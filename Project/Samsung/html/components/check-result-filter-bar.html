<ul class="asset-filter-bar-inner list-unstyled mb-0 ps-0 d-flex align-items-center">
  <li class="asset-filter-bar-item asset-filter-trigger-wrap">
    <button type="button" class="asset-filter-trigger-btn d-flex align-items-center gap-2 fw-bold" id="cr-filter-trigger" aria-expanded="false" aria-haspopup="true">
      <span class="material-symbols-outlined asset-filter-icon" style="font-variation-settings: 'FILL' 1;">filter_alt</span>
      <span class="asset-filter-label">Filter</span>
      <span class="asset-filter-badge" id="cr-filter-badge">0</span>
    </button>
  </li>
  <li class="asset-filter-bar-item asset-filter-right-wrap d-flex align-items-center flex-grow-1 min-w-0">
    <!-- 칩 영역: JS가 동적 렌더링 -->
    <div class="asset-filter-tags-container asset-filter-chips-wrap" id="cr-filter-tags-container"></div>
    <button type="button" class="asset-filter-reset-btn" id="cr-filter-reset-btn" aria-label="전체 필터 초기화">
      <span class="material-symbols-outlined">refresh</span>
      필터 초기화
    </button>
  </li>
</ul>

<!-- 점검 결과 필터 패널 (Figma 431-2955 기반) -->
<div class="asset-filter-panel cr-filter-panel d-none" id="cr-filter-panel" role="dialog" aria-label="점검 결과 필터">
  <!-- 헤더: 회색 배경, filter_alt 아이콘 + "Filter" 텍스트 -->
  <div class="cr-filter-panel-header">
    <span class="material-symbols-outlined cr-filter-panel-header-icon" style="font-variation-settings: 'FILL' 1;">filter_alt</span>
    <span class="cr-filter-panel-title">Filter</span>
  </div>
  <!-- 바디: 점검명 + 점검일 -->
  <div class="cr-filter-panel-body">
    <!-- 점검명 -->
    <div class="cr-filter-row">
      <label class="cr-filter-row-label" for="cr-filter-name">점검명</label>
      <input
        type="text"
        class="cr-filter-name-input"
        id="cr-filter-name"
        placeholder="입력하세요."
        autocomplete="off"
      />
    </div>
    <!-- 점검일 (Flatpickr 트리거) -->
    <div class="cr-filter-row">
      <label class="cr-filter-row-label">점검일</label>
      <button type="button" class="cr-date-select-btn" id="cr-panel-date-btn" aria-label="점검일 범위 선택">
        <span class="material-symbols-outlined cr-date-select-icon">calendar_month</span>
        <span class="cr-date-select-text cr-date-placeholder" id="cr-date-select-text">날짜 선택</span>
      </button>
    </div>
  </div>
  <!-- 푸터 -->
  <div class="cr-filter-panel-footer">
    <button type="button" class="cr-panel-btn cr-panel-btn-reset" id="cr-filter-panel-reset">필터 초기화</button>
    <div class="cr-filter-panel-footer-right">
      <button type="button" class="cr-panel-btn cr-panel-btn-cancel" id="cr-filter-panel-cancel">취소</button>
      <button type="button" class="cr-panel-btn cr-panel-btn-apply" id="cr-filter-panel-apply">필터 적용</button>
    </div>
  </div>
</div>
